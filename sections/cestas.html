.catalogo {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 25px;
padding: 30px;
max-width: 1300px;
margin: 0 auto;
}


.item {
background-color: #ffffff;
border-radius: 12px;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
overflow: hidden;
transition: transform 0.2s ease;
}


.item:hover {
transform: translateY(-4px);
}


.item img {
width: 100%;
aspect-ratio: 1 / 1;
object-fit: cover;
}


.info {
