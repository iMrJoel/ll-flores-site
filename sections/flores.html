<style>
body {
margin: 0;
font-family: Arial, Helvetica, sans-serif;
background-color: #ccecd4;
}


header {
text-align: center;
padding: 30px 20px;
background-color: #b7e3cc;
color: #2f5d50;
}


.catalogo {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 20px;
padding: 30px;
max-width: 1200px;
margin: 0 auto;
}


.item {
background-color: #ffffff;
border-radius: 12px;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
overflow: hidden;
transition: transform 0.2s ease;
}


.item:hover {
transform: translateY(-4px);
}


.item img {
width: 100%;
aspect-ratio: 1 / 1;
object-fit: cover;
}


.info {
padding: 15px;
text-align: center;
}


.info h3 {
margin: 5px 0;
font-size: 1.1rem;
color: #2f5d50;
}


.preco {
font-size: 1.2rem;
font-weight: bold;
color: #4aa596;
margin-top: 8px;
}


.voltar {
display: block;
text-align: center;
margin: 20px;
text-decoration: none;
color: #2f5d50;
font-weight: bold;
}
  </style>
</head>
