<style>

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #ccecd4;
}

/* CABEÇALHO */

header {
    text-align: center;
    padding: 30px 20px;
    background-color: #b7e3cc;
    color: #2f5d50;
}

header h1 {
    margin-bottom: 10px;
}

/* CATÁLOGO */

.catalogo {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 30px;
    max-width: 1200px;
    margin: 0 auto;
}

/* CARD */

.item {
    background-color: #ffffff;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    overflow: hidden;
    transition: transform 0.2s ease;

    aspect-ratio: 1 / 1;
}

.item:hover {
    transform: translateY(-4px);
}

/* IMAGEM */

.item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BOTÃO VOLTAR */

.voltar {
    display: block;
    text-align: center;
    margin: 30px;
    text-decoration: none;
    color: #2f5d50;
    font-weight: bold;
}

.voltar:hover {
    text-decoration: underline;
}

</style>
